# body-os assistive robot configuration
# Copy: cp config.example.yaml config.yaml

robot:
  name: Scout
  wake_words:
    - scout
    - hey scout
  personality: sre  # sre | gentle | minimal

tier: green  # green | yellow | red | black

voice:
  tts_engine: edge       # console | edge | pyttsx3
  stt_engine: console    # console | whisper | google
  voice: en-US-JennyNeural
  hybrid: true           # print + speak (recommended for development)
  rate: 150
  volume: 0.8

motor:
  driver: mock           # mock | gpio | serial
  allowed_tiers:
    - green
    - yellow
  max_speed: 0.3         # m/s cap
  # L298N BCM pins (uncomment for Raspberry Pi + gpio driver)
  # gpio_pins:
  #   ena: 18
  #   in1: 23
  #   in2: 24
  #   enb: 19
  #   in3: 27
  #   in4: 22
  # serial_port: /dev/ttyUSB0
  # serial_baud: 115200
  waypoints:
    dock: { x: 0.0, y: 0.0 }
    desk: { x: 1.0, y: 0.0 }
    kitchen: { x: 3.0, y: 2.0 }
    bedroom: { x: 0.5, y: 4.0 }

autonomy:
  enabled: true
  check_interval_seconds: 30
  proactive: true
  mutual_care: true
  roll_when_charging: true   # Scout rolls to dock alone; false on risky red days

battery:
  driver: mock              # mock | ina219
  mock_percent: 85
  mock_charging: false
  # Test low battery: mock_percent: 22

outdoor:
  enabled: false
  max_tier: yellow
  max_minutes: 20
  porch_dock_waypoint: dock

# Gyrosphere chassis (roadmap — pendulum drive firmware)
chassis:
  type: differential   # differential | gyrosphere
  sphere_diameter_cm: 50

sync:
  enabled: true
  host: 0.0.0.0
  port: 8765

schedule:
  morning_vitals: "08:00"
  shutdown: "22:00"
  midday_reset: "13:00"

companion:
  data_dir: ./brain/data/local

meds:
  enabled: false
  reminders: []
