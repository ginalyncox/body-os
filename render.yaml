services:
  - type: web
    name: body-os-companion
    runtime: node
    plan: free
    buildCommand: cd companion && npm ci && npm run build
    startCommand: cd companion && npm start
    envVars:
      - key: OPENAI_API_KEY
        sync: false
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
